# Check the code with flake8 and if successful, run set up postgres database and run tests.

name: Check and Test

on:
  pull_request:
    branches: ["main", "release/*", "hotfix/*"]
    paths: [".", "./.github"]
  push:
    branches: ["main"]
    paths: [".", "./.github"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    container: python:3.13.3-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cat requirements-dev.txt | grep -E 'vulture|ruff' > requirements-check.txt
          python -m pip install -r requirements-check.txt
        shell: bash

      - name: Check with ruff and vulture
        run: |
          ruff check ./src
          vulture ./src

  test:
    runs-on: ubuntu-latest
    needs: 
      - check

    container: python:3.13.3-slim
    
    services:
      postgres:
        image: postgres:14

        env:
          POSTGRES_DB: pss-fleet-data-test
          POSTGRES_PASSWORD: pgpassword
          POSTGRES_USER: pguser

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: |
          python -m pip install -r requirements-dev.txt

      - name: Install dependencies for Codecov
        run: >
          apt-get update &&
          apt-get install --no-install-recommends --yes
          ca-certificates curl git gpg gpg-agent
          
      - name: Test with pytest
        run: |
          pytest -x --cov=./src/api --cov-report=xml
        env:
          DATABASE_NAME: pss-fleet-data-test
          DATABASE_URL: pguser:pgpassword@postgres:5432

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
