[project]
name = "pss-fleet-data-api"
version = "1.5.2"
license = {file = "LICENSE"}
description = "A REST API server for Pixelstarships Fleet Data"
authors = [
    { name = "The worst.", email = "theworstpss@gmail.com" }
]
dependencies = [
    "alembic>=1.17.0",
    "asyncpg>=0.30.0",
    "fastapi[standard]>=0.120.1",
    "fastapi-limiter>=0.1.6",
    "orjson>=3.11.4",
    "psycopg2-binary>=2.9.11",
    "python-dateutil>=2.9.0.post0",
    "sqlmodel>=0.0.25",
    "sqlalchemy-utils>=0.42.0",
]
readme = "README.md"
requires-python = ">= 3.12.3"

[tool.rye]
managed = true
virtual = true
dev-dependencies = [
    "autoflake>=2.3.1",
    "autopep8>=2.3.2",
    "black>=25.9.0",
    "coverage>=7.11.0",
    "flake8>=7.3.0",
    "flake8-black>=0.4.0",
    "flake8-bugbear>=25.10.21",
    "isort>=7.0.0",
    "pre-commit>=4.3.0",
    "pytest>=8.4.2",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=7.0.0",
    "pytest-env>=1.2.0",
    "vulture>=2.14",
]

[tool.autoflake]
in-place = true
remove-all-unused-imports = true
ignore-init-module-imports = true
recursive = true

[tool.black]
line-length = 150
target-version = ['py312']
include = '\.pyi?$'

[tool.isort]
src_paths = ["src"]
profile = "black"
line_length = 150
lines_after_imports = 2

[tool.vulture]
min_confidence = 100
paths = ["./src/api"]
sort_by_size = true
