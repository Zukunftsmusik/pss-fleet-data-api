[tool.poetry]
name = "pss-fleet-data-api"
description = "An API server for Pixelstarships Fleet Data"
version = "0.0.1"
license = "MIT"
authors = [
    "The worst. <theworstpss@gmail.com>",
]
readme = "README.md"
homepage = "https://github.com/PSS-Tools-Development/pss-fleet-data-api/issues"
classifiers = [
    'Development Status :: 3 - Alpha',
    'Intended Audience :: Developers',
    'Programming Language :: Python :: 3.12',
    'Natural Language :: English',
    'Operating System :: OS Independent',
]

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/PSS-Tools-Development/pss-fleet-data-api/issues"
"Changelog" = "https://github.com/PSS-Tools-Development/pss-fleet-data-api/releases"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.111.0"
asyncpg = "^0.29.0"

[tool.poetry.group.dev.dependencies]
autoflake = "^2.3.1"
autopep8 = "^2.2.0"
flake8 = "^7.0.0"
flake8-bugbear = "^24.4.26"
flake8-black = "^0.3.6"
black = "^24.4.2"
isort = "^5.13.2"
pytest = "^7.2.1"
pytest-asyncio = "^0.21.0"
pytest-vcr = "^1.0.2"
vcrpy = "^6.0.1"
pytest-cov = "^4.1.0"

[tool.autoflake]
in-place = true
remove-all-unused-imports = true
ignore-init-module-imports = true
recursive = true

[tool.isort]
src_paths = ["src", "tests", "showcase.py"]
profile = "black"
line_length = 200

[tool.black]
line-length = 200
target-version = ['py312']
include = '\.pyi?$'
